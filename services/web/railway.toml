# =============================================================================
# OpenClaw Web Service - Railway Configuration
# PUBLIC SERVICE (the only public HTTP surface)
# Monorepo path contract: service root directory must be `services/web`.
# If using custom config file path in Railway, set `/services/web/railway.toml`.
# =============================================================================

[build]
builder = "dockerfile"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"

[variables]
NEXT_TELEMETRY_DISABLED = "1"

# Hostname binding for IPv4/IPv6 dual-stack support.
# Railway private networking supports both IPv4 and IPv6 (new environments)
# and IPv6-only (legacy environments). Binding to :: ensures compatibility.
HOSTNAME = "::"
