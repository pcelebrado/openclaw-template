# =============================================================================
# OpenClaw Web Service — Railway Config-as-Code
# PUBLIC SERVICE (the only public HTTP surface)
# =============================================================================
# railway.toml controls build + deploy settings only.
# Environment variables are configured via the Railway dashboard or
# Raw Editor (see .env.railway for copy-paste values).
# =============================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = [
  "/services/web/**",
  "!**/node_modules/**",
  "!**/*.test.ts",
  "!**/*.test.tsx"
]

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[variables]
# ---------------------------------------------------------------------------
# Next.js / Node settings
# ---------------------------------------------------------------------------
NEXT_TELEMETRY_DISABLED = "1"
HOSTNAME = "::"

# ---------------------------------------------------------------------------
# MongoDB connection (via Core service private networking)
# ---------------------------------------------------------------------------
MONGODB_URI = "mongodb://${{openclaw-core.RAILWAY_PRIVATE_DOMAIN}}:27017/openclaw"

# ---------------------------------------------------------------------------
# Internal Core service connection
# ---------------------------------------------------------------------------
INTERNAL_CORE_BASE_URL = "http://${{openclaw-core.RAILWAY_PRIVATE_DOMAIN}}:8080"

# ---------------------------------------------------------------------------
# Service-to-service auth (auto-generated, synced with Core)
# ---------------------------------------------------------------------------
INTERNAL_SERVICE_TOKEN = "${{openclaw-core.INTERNAL_SERVICE_TOKEN}}"

# ---------------------------------------------------------------------------
# NextAuth / Auth.js configuration
# ---------------------------------------------------------------------------
AUTH_SECRET = "${{secret(43, \"abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789+/\")}}="
AUTH_URL = "https://${{RAILWAY_PUBLIC_DOMAIN}}"
NEXT_PUBLIC_APP_URL = "https://${{RAILWAY_PUBLIC_DOMAIN}}"

# ---------------------------------------------------------------------------
# Book content configuration
# ---------------------------------------------------------------------------
BOOK_SOURCE_MODE = "external"
BOOK_SOURCE_DIR = "/data/book-source"
BOOK_IMPORT_MANIFEST = "/data/book-source/manifest.json"
BOOK_CANONICAL_COLLECTION = "book_sections"
BOOK_TOC_COLLECTION = "book_toc"
BOOK_IMPORT_ENABLED = "false"
BOOK_IMPORT_DRY_RUN = "true"
