# =============================================================================
# OpenClaw Web Service - Railway Configuration
# PUBLIC SERVICE (the only public HTTP surface)
# =============================================================================
# Next.js 14 frontend with standalone output.
# Railway monorepo auto-import detects this file at the workspace package root.
# =============================================================================

[build]
builder = "DOCKERFILE"
watchPatterns = [
  "/services/web/**",
  "!**/node_modules/**",
  "!**/*.test.ts",
  "!**/*.test.tsx"
]

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[variables]
NEXT_TELEMETRY_DISABLED = "1"

# Hostname binding for IPv4/IPv6 dual-stack support.
# Railway private networking supports both IPv4 and IPv6 (new environments)
# and IPv6-only (legacy environments). Binding to :: ensures compatibility.
HOSTNAME = "::"
