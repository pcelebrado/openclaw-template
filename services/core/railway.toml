# =============================================================================
# OpenClaw Core Service - Railway Configuration (MVP)
# CONSOLIDATED SERVICE: OpenClaw + MongoDB + QMD + SFTPGo
# =============================================================================
# This service runs OpenClaw, QMD, embedded MongoDB, and SFTPGo.
# All persistent data is stored on a single Railway volume at /data (500MB).
#
# Railway monorepo auto-import detects this file at the workspace package root.
# =============================================================================

[build]
builder = "DOCKERFILE"
watchPatterns = [
  "/services/core/**",
  "!**/node_modules/**",
  "!**/*.test.js"
]

[deploy]
healthcheckPath = "/setup/healthz"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Require a persistent volume mounted at /data (Railway).
# Volume layout:
#   /data/db          — MongoDB data files
#   /data/log         — MongoDB + SFTPGo logs
#   /data/.openclaw   — OpenClaw state and config
#   /data/workspace   — OpenClaw workspace
#   /data/book-source — Book content staging (optional)
#   /data/sftpgo      — SFTPGo state, host keys, user data
requiredMountPath = "/data"

[variables]
# =============================================================================
# All variables below are injected into every deployment of this service.
# Secrets and cross-service references are set in the Railway Template Composer
# (dashboard) — they use ${{...}} syntax which railway.toml cannot express.
# =============================================================================

# --- OpenClaw State & Workspace ---
# Where OpenClaw stores configs, auth, sessions on the persistent volume.
OPENCLAW_STATE_DIR = "/data/.openclaw"
# Where files created via OpenClaw will reside on the persistent volume.
OPENCLAW_WORKSPACE_DIR = "/data/workspace"

# --- Volume Permissions ---
# Railway volumes mount as root. This ensures the container can access /data.
RAILWAY_RUN_UID = "0"

# --- Embedded MongoDB ---
# MongoDB runs inside this container on all interfaces (IPv6+IPv4).
# Web service connects via Railway private networking: openclaw-core.railway.internal:27017
MONGO_PORT = "27017"
MONGO_BIND_IP = "::,0.0.0.0"
MONGODB_URI = "mongodb://127.0.0.1:27017/openclaw"

# --- Embedded SFTPGo ---
# SFTP on port 2022 — enable TCP Proxy in Railway dashboard to expose externally.
# Web admin on port 2080 (internal only via private networking).
SFTPGO_ENABLED = "true"
SFTPGO_DATA_ROOT = "/data/sftpgo"
SFTPGO_SFTPD__BINDINGS__0__PORT = "2022"
SFTPGO_HTTPD__BINDINGS__0__PORT = "2080"
SFTPGO_DATA_PROVIDER__CREATE_DEFAULT_ADMIN = "true"
# Default SFTPGo admin credentials (change in Railway Variables for production).
SFTPGO_DEFAULT_ADMIN_USERNAME = "admin"

# --- Book Content ---
# Controls where book content is sourced and staged before import.
BOOK_SOURCE_MODE = "external"
BOOK_SOURCE_DIR = "/data/book-source"
BOOK_IMPORT_MANIFEST = "/data/book-source/manifest.json"
BOOK_CANONICAL_COLLECTION = "book_sections"
BOOK_TOC_COLLECTION = "book_toc"
BOOK_IMPORT_ENABLED = "false"
BOOK_IMPORT_DRY_RUN = "true"

# =============================================================================
# The following variables MUST be set in Railway Template Composer (dashboard)
# because they use template functions or cross-service references:
#
# SETUP_PASSWORD              = (REQUIRED — user must set at deploy time)
#   → Protects the /setup UI from the rest of the world. Leave the default
#   → empty in the template composer so the user is prompted to set it.
#
# OPENCLAW_GATEWAY_TOKEN      = ${{secret(64, "abcdef0123456789")}}
#   → Token that protects the OpenClaw gateway. Auto-generated.
#
# INTERNAL_SERVICE_TOKEN      = ${{shared.INTERNAL_SERVICE_TOKEN}}
#   → Shared secret for web↔core auth. Must match on both services.
#   → Create a Shared Variable in the template composer.
#
# SFTPGO_DEFAULT_ADMIN_PASSWORD = ${{secret(24, "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789")}}
#   → Auto-generated password for SFTPGo admin.
# =============================================================================
