# =============================================================================
# OpenClaw Core Service - Railway Configuration
# INTERNAL-ONLY SERVICE
# Monorepo path contract: service root directory must be `services/core`.
# If using custom config file path in Railway, set `/services/core/railway.toml`.
# =============================================================================
# BOUNDARY RULE: This service MUST NOT have public HTTP exposure.
# Configure Railway service settings: Networking > Public Networking = DISABLED.
# Only the `web` service is publicly accessible.
# =============================================================================

[build]
builder = "dockerfile"

[deploy]
healthcheckPath = "/setup/healthz"
healthcheckTimeout = 300
restartPolicyType = "on_failure"

# Require a persistent volume mounted at /data (Railway).
requiredMountPath = "/data"

[variables]
# NOTE: Railway injects PORT automatically.
# Do not set PORT here; Railway templates may not apply it reliably and hardcoding
# can cause domain routing mismatches.
OPENCLAW_STATE_DIR = "/data/.openclaw"
OPENCLAW_WORKSPACE_DIR = "/data/workspace"

# Internal service auth token.
# Must match the value set on the web service as INTERNAL_SERVICE_TOKEN.
# All /internal/* endpoints MUST verify this token.
# INTERNAL_SERVICE_TOKEN = "set-in-railway-variables-not-here"
