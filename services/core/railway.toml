# =============================================================================
# OpenClaw Core Service - Railway Configuration (MVP)
# CONSOLIDATED SERVICE: OpenClaw + MongoDB + QMD + SFTPGo
# Monorepo path contract: service root directory must be `services/core`.
# If using custom config file path in Railway, set `/services/core/railway.toml`.
# =============================================================================
# This service runs OpenClaw, QMD, embedded MongoDB, and SFTPGo.
# All persistent data is stored on a single Railway volume at /data (500MB).
# =============================================================================

[build]
builder = "dockerfile"
watchPatterns = [
  "/services/core/**",
  "!**/node_modules/**",
  "!**/*.test.js"
]

[deploy]
healthcheckPath = "/setup/healthz"
healthcheckTimeout = 300
restartPolicyType = "on_failure"

# Require a persistent volume mounted at /data (Railway).
# Volume layout:
#   /data/db          — MongoDB data files
#   /data/log         — MongoDB + SFTPGo logs
#   /data/.openclaw   — OpenClaw state and config
#   /data/workspace   — OpenClaw workspace
#   /data/book-source — Book content staging (optional)
#   /data/sftpgo      — SFTPGo state, host keys, user data
requiredMountPath = "/data"

[variables]
# NOTE: Railway injects PORT automatically.
# The service should listen on 0.0.0.0:$PORT or ::$PORT for healthchecks to work.
# Do not hardcode PORT here to avoid domain routing mismatches.
OPENCLAW_STATE_DIR = "/data/.openclaw"
OPENCLAW_WORKSPACE_DIR = "/data/workspace"

# Volume permissions: volumes are mounted as root, so non-root containers
# need this to access the volume properly.
RAILWAY_RUN_UID = "0"

# Embedded MongoDB configuration.
# MongoDB runs inside this container and listens on all interfaces (IPv6+IPv4).
# The web service connects via Railway private networking: core.railway.internal:27017
# Railway private networking requires IPv6 binding (::) for service discovery.
MONGO_PORT = "27017"
MONGO_BIND_IP = "::,0.0.0.0"
MONGODB_URI = "mongodb://127.0.0.1:27017/openclaw"

# Embedded SFTPGo configuration.
# SFTP on port 2022 — enable TCP Proxy in Railway dashboard to expose externally.
# Web admin on port 2080 (internal only — accessible via private networking).
# Set SFTPGO_DEFAULT_ADMIN_USERNAME and SFTPGO_DEFAULT_ADMIN_PASSWORD in Railway
# Variables (not here) to create the initial admin account on first boot.
SFTPGO_ENABLED = "true"
SFTPGO_DATA_ROOT = "/data/sftpgo"
SFTPGO_SFTPD__BINDINGS__0__PORT = "2022"
SFTPGO_HTTPD__BINDINGS__0__PORT = "2080"
SFTPGO_DATA_PROVIDER__CREATE_DEFAULT_ADMIN = "true"

# Internal service auth token.
# Must match the value set on the web service as INTERNAL_SERVICE_TOKEN.
# All /internal/* endpoints MUST verify this token.
# INTERNAL_SERVICE_TOKEN = "set-in-railway-variables-not-here"
